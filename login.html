<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login — Earth of Games</title>
<link rel="icon" href="eog1.png">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050710;--surface:#0c1020;--card:#111827;
  --accent1:#00f0ff;--accent2:#ff3a6e;--accent3:#ffe000;
  --text:#e8eaf6;--muted:#6b7280;
  --radius:18px;--radius-sm:12px;--radius-xs:8px;
  --glow1:0 0 24px #00f0ff55,0 0 60px #00f0ff1a;
  --glow2:0 0 24px #ff3a6e55;
  --border:rgba(255,255,255,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  overflow:hidden;cursor:none;position:relative}
body::before{content:'';position:fixed;inset:0;z-index:0;opacity:.025;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

#cursor{position:fixed;top:0;left:0;z-index:9999;pointer-events:none;mix-blend-mode:difference}
#cursor .dot{width:10px;height:10px;background:var(--accent1);border-radius:50%;transform:translate(-50%,-50%)}
#cursor .ring{position:absolute;top:0;left:0;width:38px;height:38px;border:2px solid var(--accent1);border-radius:50%;transform:translate(-50%,-50%);transition:width .3s,height .3s;opacity:.65}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}

/* BG GRID */
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,240,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,240,255,.035) 1px,transparent 1px);
  background-size:55px 55px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,#000 20%,transparent 80%);
  animation:gridPulse 8s ease-in-out infinite}
@keyframes gridPulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ORBS */
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);animation:orbF 10s ease-in-out infinite}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#00f0ff14,transparent 70%);top:-15%;left:-15%}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#ff3a6e12,transparent 70%);bottom:-10%;right:-10%;animation-delay:-5s}
@keyframes orbF{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}

/* LOGIN CARD */
.login-wrap{
  position:relative;z-index:10;
  width:100%;max-width:440px;
  padding:0 1.2rem;
  animation:cardAppear .7s cubic-bezier(.25,.8,.25,1) forwards;
}
@keyframes cardAppear{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

.login-card{
  background:rgba(11,16,32,.92);
  border:1px solid rgba(0,240,255,.12);
  border-radius:var(--radius);
  backdrop-filter:blur(20px);
  overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,.6),var(--glow1);
}

/* card top accent */
.card-bar{height:4px;background:linear-gradient(90deg,var(--accent1),var(--accent2),var(--accent3))}

.card-body{padding:2.8rem 2.4rem 2.4rem}

/* LOGO AREA */
.login-logo{display:flex;flex-direction:column;align-items:center;gap:.7rem;margin-bottom:2.2rem}
.logo-icon{
  width:64px;height:64px;border-radius:16px;
  background:rgba(0,240,255,.06);border:1px solid rgba(0,240,255,.2);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--glow1);
}
.logo-icon svg{width:38px;height:38px}
.logo-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.1em;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.logo-sub{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.3em;
  color:var(--muted);text-transform:uppercase}

/* TITLE */
.login-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;
  text-align:center;margin-bottom:.4rem}
.login-desc{color:var(--muted);font-size:.9rem;text-align:center;margin-bottom:2rem;line-height:1.6}

/* FORM */
.form-group{margin-bottom:1.2rem;position:relative}
.form-group label{display:flex;align-items:center;gap:.4rem;font-family:'Space Mono',monospace;
  font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.form-group label .lico{font-size:.85rem}
.form-group input{
  width:100%;padding:.82rem 1rem .82rem 2.8rem;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-xs);
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;
  outline:none;transition:border-color .3s,box-shadow .3s;
}
.form-group input:focus{border-color:var(--accent1);box-shadow:0 0 0 3px rgba(0,240,255,.1)}
.form-group input.error{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(255,58,110,.1)}
.input-icon{position:absolute;left:.9rem;bottom:.85rem;color:var(--muted);font-size:1rem;pointer-events:none}
.toggle-pw{position:absolute;right:.9rem;bottom:.85rem;color:var(--muted);cursor:pointer;font-size:.9rem;
  transition:color .2s;background:none;border:none;padding:0}
.toggle-pw:hover{color:var(--accent1)}

/* REMEMBER ROW */
.remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.6rem}
.check-wrap{display:flex;align-items:center;gap:.5rem;cursor:pointer}
.check-wrap input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent1);cursor:pointer}
.check-wrap span{font-size:.88rem;color:var(--muted)}
.forgot-link{font-size:.82rem;color:var(--accent1);text-decoration:none;
  font-family:'Space Mono',monospace;letter-spacing:.05em;transition:opacity .2s}
.forgot-link:hover{opacity:.7}

/* ERROR MSG */
.error-msg{
  display:none;align-items:center;gap:.5rem;
  background:rgba(255,58,110,.1);border:1px solid rgba(255,58,110,.25);
  border-radius:var(--radius-xs);padding:.75rem 1rem;margin-bottom:1.2rem;
  color:var(--accent2);font-size:.88rem;font-weight:600;
  animation:shake .4s ease;
}
.error-msg.show{display:flex}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* SUBMIT */
.submit-btn{
  width:100%;padding:.9rem;border-radius:var(--radius-xs);border:none;
  background:linear-gradient(90deg,var(--accent1),#00bcd4);
  color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;
  letter-spacing:.18em;text-transform:uppercase;cursor:pointer;
  transition:box-shadow .3s,transform .2s,opacity .3s;
  position:relative;overflow:hidden;
}
.submit-btn:hover:not(:disabled){box-shadow:var(--glow1);transform:translateY(-2px)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}
.submit-btn .spinner{display:none;width:18px;height:18px;border:2px solid rgba(0,0,0,.3);
  border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
.submit-btn.loading .btn-text{display:none}
.submit-btn.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:1rem;margin:1.4rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}

/* BACK LINK */
.back-link{display:flex;align-items:center;justify-content:center;gap:.4rem;
  color:var(--muted);font-size:.88rem;text-decoration:none;transition:color .3s;margin-top:1.2rem}
.back-link:hover{color:var(--accent1)}

/* SUCCESS FLASH */
.success-overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(5,7,16,.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;
  opacity:0;pointer-events:none;transition:opacity .5s;
}
.success-overlay.show{opacity:1;pointer-events:all}
.success-icon{font-size:4rem;animation:popIn .5s cubic-bezier(.25,.8,.25,1)}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:.1em;color:var(--accent1)}
.success-sub{color:var(--muted);font-family:'Space Mono',monospace;font-size:.75rem;letter-spacing:.15em}
.success-bar{width:200px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:.5rem}
.success-fill{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2));border-radius:2px;
  width:0%;transition:width 2s linear}

/* credentials hint box */
.hint-box{
  background:rgba(0,240,255,.04);border:1px dashed rgba(0,240,255,.18);
  border-radius:var(--radius-xs);padding:.85rem 1rem;margin-bottom:1.4rem;
}
.hint-box p{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;color:var(--muted);line-height:1.9}
.hint-box span{color:var(--accent1)}
</style>
</head>
<body>
<div id="cursor"><div class="dot"></div><div class="ring"></div></div>
<canvas id="stars"></canvas>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✅</div>
  <div class="success-title">Access Granted</div>
  <div class="success-sub">Redirecting to dashboard...</div>
  <div class="success-bar"><div class="success-fill" id="successFill"></div></div>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="card-bar"></div>
    <div class="card-body">

      <!-- LOGO -->
      <div class="login-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="14" stroke="#00f0ff" stroke-width="2"/>
            <path d="M10 16 Q16 8 22 16 Q16 24 10 16Z" fill="#00f0ff" opacity=".85"/>
            <circle cx="16" cy="16" r="3" fill="#ffe000"/>
          </svg>
        </div>
        <div class="logo-name">Earth of Games</div>
        <div class="logo-sub">Admin Portal</div>
      </div>

      <div class="login-title">Welcome Back</div>
      <div class="login-desc"> in to access the admin dashboard and manage your games.</div>

      <!-- DEMO HINT -->
      <div class="hint-box">
        <p>Demo credentials:<br>
         <span> Username of IG </span> &nbsp;|&nbsp;  <span>Password of IG</span>
        </p>
      </div>

      <!-- ERROR -->
      <div class="error-msg" id="errorMsg">
        <span>🔒</span> <span id="errorText">Invalid username or password.</span>
      </div>

      <!-- FORM -->
      <div class="form-group">
        <label><span class="lico">🙍‍♂️</span> Username</label>
        <span class="input-icon">🙍‍♂️</span>
        <input type="text" id="username" placeholder="Enter admin username" autocomplete="username"/>
      </div>

      <div class="form-group">
        <label><span class="lico">🔑</span> Password</label>
        <span class="input-icon">🔑</span>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" id="pwInput"/>
        <button class="toggle-pw" id="togglePw" type="button" onclick="togglePassword()">👁</button>
      </div>

      <div class="remember-row">
        <label class="check-wrap">
          <input type="checkbox" id="remember"/> <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
 
      <button class="submit-btn" id="loginBtn" onclick="doLogin()">
        <span class="btn-text">Sign In to Dashboard</span>
        <div class="spinner"></div>
      </button>

      <div class="divider"><span>or</span></div>

      <a href="index.html" class="back-link">← Back to Website</a>
    </div>
  </div>
</div>

<script>
/* ─── CREDENTIALS ─── change these to your own ─── */
const ADMIN_USERS = [
  { username: 'im.regis_',    password: 'messi1' },
  { username: 'heis_landry_',  password: 'centralcee' },
];

/* stars */
const sc=document.getElementById('stars'),sx=sc.getContext('2d');
function rsz(){sc.width=innerWidth;sc.height=innerHeight}rsz();window.addEventListener('resize',rsz);
const sl=Array.from({length:150},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.4+.3,s:Math.random()*.5+.1}));
function ds(){sx.clearRect(0,0,sc.width,sc.height);const t=Date.now()/1000;sl.forEach(s=>{const o=.25+.5*(.5+.5*Math.sin(t*s.s+s.x));sx.beginPath();sx.arc(s.x,s.y,s.r,0,Math.PI*2);sx.fillStyle=`rgba(255,255,255,${o*.7})`;sx.fill()});requestAnimationFrame(ds)}ds();

/* cursor */
const cur=document.getElementById('cursor'),dot=cur.querySelector('.dot'),ring=cur.querySelector('.ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.transform=`translate(${mx}px,${my}px) translate(-50%,-50%)`});
(function ar(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.transform=`translate(${rx}px,${ry}px) translate(-50%,-50%)`;requestAnimationFrame(ar)})();

/* redirect if already logged in */
if(sessionStorage.getItem('eog_admin_auth')==='1'){window.location.href='admin.html';}

/* toggle password visibility */
function togglePassword(){
  const inp=document.getElementById('password');
  const btn=document.getElementById('togglePw');
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁';}
}

/* Enter key */
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

/* shake animation on fields */
function shakeField(id){
  const el=document.getElementById(id);
  el.classList.add('error');
  el.style.animation='shake .4s ease';
  setTimeout(()=>{el.style.animation='';},450);
}

/* login logic */
function doLogin(){
  const uEl=document.getElementById('username');
  const pEl=document.getElementById('password');
  const btn=document.getElementById('loginBtn');
  const errMsg=document.getElementById('errorMsg');
  const errTxt=document.getElementById('errorText');

  const u=uEl.value.trim();
  const p=pEl.value;

  /* clear previous errors */
  uEl.classList.remove('error');pEl.classList.remove('error');
  errMsg.classList.remove('show');

  /* validation */
  if(!u){shakeField('username');showError('Please enter your username.');return}
  if(!p){shakeField('password');showError('Please enter your password.');return}

  /* loading state */
  btn.disabled=true;btn.classList.add('loading');

  setTimeout(()=>{
    const match=ADMIN_USERS.find(a=>a.username===u&&a.password===p);

    if(match){
      /* store session */
      sessionStorage.setItem('eog_admin_auth','1');
      sessionStorage.setItem('eog_admin_user',u);
      if(document.getElementById('remember').checked){
        localStorage.setItem('eog_admin_auth','1');
        localStorage.setItem('eog_admin_user',u);
      }
      /* success screen */
      const ov=document.getElementById('successOverlay');
      ov.classList.add('show');
      setTimeout(()=>{document.getElementById('successFill').style.width='100%'},50);
      setTimeout(()=>{window.location.href='admin.html'},2200);
    } else {
      btn.disabled=false;btn.classList.remove('loading');
      uEl.classList.add('error');pEl.classList.add('error');
      showError('Invalid username or password. Please try again.');
      pEl.value='';
    }
  },900);
}

function showError(msg){
  const errMsg=document.getElementById('errorMsg');
  const errTxt=document.getElementById('errorText');
  errTxt.textContent=msg;
  errMsg.classList.add('show');
}

/* check localStorage on load */
if(localStorage.getItem('eog_admin_auth')==='1'){
  sessionStorage.setItem('eog_admin_auth','1');
  window.location.href='admin.html';
}
</script>
</body>
</html>
